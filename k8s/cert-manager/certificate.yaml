apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: go-mtls-server
spec:
  secretName: go-mtls-server-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  subject:
    organizations:
      - PKI Demo
  commonName: go-mtls-server
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - go-mtls-server
    - go-mtls-server.default.svc.cluster.local
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io